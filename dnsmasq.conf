# NetworkGuard DHCP Server (dnsmasq)
# Replaces router DHCP so devices get NetworkGuard as their DNS directly

# Don't act as a DNS server (NetworkGuard handles DNS on port 53)
port=0

# DHCP interface
interface=enp1s0
bind-interfaces

# DHCP range and lease time
dhcp-range=192.168.1.10,192.168.1.254,255.255.255.0,24h

# Gateway (your router)
dhcp-option=option:router,192.168.1.1

# DNS server (NetworkGuard on this machine — change to your server's IP)
dhcp-option=option:dns-server,192.168.1.204

# Static reservations (add your own devices here)
# dhcp-host=AA:BB:CC:DD:EE:FF,192.168.1.100,MyServer
# dhcp-host=11:22:33:44:55:66,192.168.1.101,MyPC

# Run as root (needed to write leases file)
user=root

# Leases file path
dhcp-leasefile=/var/lib/misc/dnsmasq.leases

# Logging
log-dhcp
log-queries
